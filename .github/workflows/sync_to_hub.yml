name: Sync to Hugging Face hub

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Configure git
        run: |
          git config user.email "github-actions@users.noreply.github.com"
          git config user.name "GitHub Actions"

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USER: omar559
          HF_SPACE: Kharbasha-api
        run: |
          set -e
          if [ -z "$HF_TOKEN" ]; then
            echo "::error::HF_TOKEN secret is not set"
            exit 1
          fi

          # Store credentials in ~/.git-credentials so the token never appears
          # in the remote URL (which would break if it contains URL-special chars)
          git config --global credential.helper store
          printf "https://%s:%s@huggingface.co\n" "${HF_USER}" "${HF_TOKEN}" > "$HOME/.git-credentials"
          chmod 600 "$HOME/.git-credentials"

          REMOTE_URL="https://huggingface.co/spaces/${HF_USER}/${HF_SPACE}"
          echo "Pushing to ${REMOTE_URL}"

          git remote remove hf 2>/dev/null || true
          git remote add hf "${REMOTE_URL}"

          # Capture full push output so we can see what HF says if it rejects
          if git push --force hf main 2>&1 | tee /tmp/push.log; then
            echo "Sync complete."
          else
            echo ""
            echo "====== FULL PUSH LOG ======"
            cat /tmp/push.log
            echo "==========================="
            echo "::error::git push to HF Space failed"
            exit 1
          fi
