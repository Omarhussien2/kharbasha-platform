name: Sync to Hugging Face hub

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Configure git
        run: |
          git config user.email "github-actions@users.noreply.github.com"
          git config user.name "GitHub Actions"

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USER: omar559
          HF_SPACE: Kharbasha-api
        shell: bash
        run: |
          set -eo pipefail

          if [ -z "$HF_TOKEN" ]; then
            echo "::error::HF_TOKEN secret is not set"
            exit 1
          fi

          # Store credentials securely instead of putting the token in the URL
          git config --global credential.helper store
          printf "https://%s:%s@huggingface.co\n" "${HF_USER}" "${HF_TOKEN}" > "$HOME/.git-credentials"
          chmod 600 "$HOME/.git-credentials"

          REMOTE_URL="https://huggingface.co/spaces/${HF_USER}/${HF_SPACE}"
          echo "Pushing to ${REMOTE_URL}"

          git remote remove hf 2>/dev/null || true
          git remote add hf "${REMOTE_URL}"

          # Run push with all output visible. Exit code reflects git push, not tee.
          set +e
          git push --force --verbose hf main > /tmp/push.out 2>&1
          rc=$?
          set -e

          echo "====== PUSH OUTPUT ======"
          cat /tmp/push.out
          echo "========================="
          echo "git push exit code: ${rc}"

          if [ "${rc}" -ne 0 ]; then
            echo "::error::git push to HF Space failed (exit ${rc})"
            exit "${rc}"
          fi

          # After a successful push, restart the Space so HF rebuilds the Docker image.
          # This is required when the Space is stuck in an error state (e.g. after a
          # bad README previously left it in "Configuration error").
          echo "Triggering Space rebuild via HF API..."
          restart_http=$(curl -s -o /tmp/restart.out -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${HF_TOKEN}" \
            "https://huggingface.co/api/spaces/${HF_USER}/${HF_SPACE}/restart?factory=true")
          echo "Restart response (HTTP ${restart_http}):"
          cat /tmp/restart.out
          if [ "${restart_http}" != "200" ] && [ "${restart_http}" != "204" ]; then
            echo "::warning::Space restart returned HTTP ${restart_http} — the push succeeded but rebuild may not have triggered automatically."
          else
            echo "Space rebuild triggered."
          fi

          echo "Sync complete."
