<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#1a0a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4A0FF"/>
      <stop offset="100%" stop-color="#855CD6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Glow effects -->
  <ellipse cx="600" cy="280" rx="500" ry="250" fill="#f59e0b" opacity="0.03"/>
  <ellipse cx="600" cy="280" rx="300" ry="150" fill="#855CD6" opacity="0.05"/>

  <!-- Scarab Logo (large, centered) -->
  <g transform="translate(600, 220) scale(3.5)">
    <ellipse cx="0" cy="0" rx="18" ry="12" fill="#855CD6" opacity="0.2"/>
    <ellipse cx="0" cy="0" rx="16" ry="10" fill="#855CD6" opacity="0.4"/>
    <path d="M0-18c-2 0-3.5 1-4 2.5-.5-1.5-2-2.5-4-2.5-2.5 0-4 1.5-4 3.5 0 3 4 5.5 8 9 4-3.5 8-6 8-9 0-2-1.5-3.5-4-3.5z" fill="url(#purple)"/>
    <ellipse cx="0" cy="0" rx="14" ry="10" fill="url(#purple)"/>
    <line x1="0" y1="-10" x2="0" y2="10" stroke="#855CD6" stroke-width="1.5"/>
    <path d="M-14 0c6-2 10-2 14-2s8 0 14 2" stroke="#855CD6" stroke-width="1" opacity="0.5"/>
    <path d="M-13-4c5-1.5 9-2 13-2s8 .5 13 2" stroke="#855CD6" stroke-width="1" opacity="0.5"/>
    <path d="M-13 4c5 1.5 9 2 13 2s8-.5 13-2" stroke="#855CD6" stroke-width="1" opacity="0.5"/>
    <path d="M-16-6c-3-2-5-1-6 1s0 4 2 5" stroke="#D4A0FF" stroke-width="2" stroke-linecap="round" fill="none"/>
    <path d="M16-6c3-2 5-1 6 1s0 4-2 5" stroke="#D4A0FF" stroke-width="2" stroke-linecap="round" fill="none"/>
  </g>

  <!-- Title -->
  <text x="600" y="400" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="64" font-weight="bold">
    خربشة
  </text>

  <!-- Tagline -->
  <text x="600" y="450" text-anchor="middle" fill="#f59e0b" font-family="system-ui, sans-serif" font-size="28" font-weight="600">
    أقوى أداة عربية لسحب البيانات بالذكاء الاصطناعي
  </text>

  <!-- Subtitle -->
  <text x="600" y="500" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="20" opacity="0.5">
    مجاني 100% — باللهجة المصرية والسعودية
  </text>

  <!-- Bottom accent line -->
  <rect x="400" y="560" width="400" height="3" rx="1.5" fill="url(#accent)" opacity="0.6"/>

  <!-- URL -->
  <text x="600" y="595" text-anchor="middle" fill="white" font-family="monospace" font-size="14" opacity="0.3">
    kharbasha-platform-main.vercel.app
  </text>
</svg>
